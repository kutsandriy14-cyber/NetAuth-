name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create environment configuration
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1

      - name: Clean stale wrapper files if any
        run: |
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f app/debug.keystore.base64 ]; then
            echo "Decoding app/debug.keystore.base64..."
            base64 -d app/debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found. Generating a new debug.keystore using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.3.1"
          name: "NetAuth 2.3.1"
          body: |
            ### Описание релиза / Release Description
            Внимание! Данная версия приложения временно **не работает 24/7** и не запустится до тех пор, пока не будет полностью доделана база данных.
            
            *Attention! This version is currently **not running 24/7** and won't launch until the database development is completed.*
            
            ---
            **Изменения:**
            - Полностью настроен рабочий процесс автоматической CI/CD сборки через GitHub Actions.
            - Автоматический декодинг / генерация подписи debug.keystore при сборке.
            - Сборка и автоматическая публикация готового установочного файла (.apk).
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk

